<!DOCTYPE html>
<html>
<body>

<script>
    let marks = Number(prompt("Enter your marks:"));

    if (marks >= 80 && marks <= 100) {
        document.write("Result: <b>Distinction</b>");
    } 
    else if (marks >= 60 && marks < 80) {
        document.write("Result: <b>First Division</b>");
    } 
    else if (marks >= 50 && marks < 60) {
        document.write("Result: <b>Second Division</b>");
    } 
    else if (marks >= 40 && marks < 50) {
        document.write("Result: <b>Third Division</b>");
    } 
    else if (marks >= 0 && marks < 40) {
        document.write("Result: <b>Fail</b>");
    } 
    else {

        document.write("<b>Invalid Marks!</b> Please enter a value between 0 and 100.");
    }
</script>

</body>
</html>
