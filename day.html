<!DOCTYPE html>
<html>
<body>

<script>
    let dayNumber = parseInt(prompt("Enter a number (1-7) to see the day:"));


    switch (dayNumber) {
        case 1:
            document.write("The day is: <b>Sunday</b>");
            break;
        case 2:
            document.write("The day is: <b>Monday</b>");
            break;
        case 3:
            document.write("The day is: <b>Tuesday</b>");
            break;
        case 4:
            document.write("The day is: <b>Wednesday</b>");
            break;
        case 5:
            document.write("The day is: <b>Thursday</b>");
            break;
        case 6:
            document.write("The day is: <b>Friday</b>");
            break;
        case 7:
            document.write("The day is: <b>Saturday</b>");
            break;
        default:
            document.write("<b>Invalid Input!</b> Please enter a number between 1 and 7.");
    }
</script>

</body>
</html>
