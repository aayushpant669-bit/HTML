<!DOCTYPE html>
<html>
<head>
    <title>Sum and Product</title>
</head>
<body>
<script>

var arr = [1,2,3,4,5];

var sum = 0;
var product = 1;

for(var i=0; i<arr.length; i++)
{
sum = sum + arr[i];
product = product * arr[i];
}

alert("Sum = " + sum);
alert("Product = " + product);

</script>

</body>
</html>
