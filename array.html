<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Array Join</title>
</head>
<body>

    <h1>Check the Console (Press F12)</h1>

    <script>
        const myColor = ["Red", "Green", "White", "Black"];

  
        console.log(myColor.toString());
        console.log(myColor.join());
        console.log(myColor.join('+'));

        
        document.write("<p>" + myColor.toString() + "</p>");
        document.write("<p>" + myColor.join() + "</p>");
        document.write("<p>" + myColor.join('+') + "</p>");
    </script>

</body>
</html>
