<!DOCTYPE html>
<html>
<body>

<script>
    let integerNum = 25;

    let floatNum = 99.99;

    let message = "Hello, JavaScript!";

    let isWorking = true;

    document.write("<b>Numeric Value:</b> " + integerNum + "<br>");
    document.write("<b>Float Value:</b> " + floatNum + "<br>");
    document.write("<b>String Value:</b> " + message + "<br>");
    document.write("<b>Boolean Value:</b> " + isWorking + "<br>");
</script>

</body>
</html>
