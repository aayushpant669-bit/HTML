<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Form Example</title>
</head>
<body>
    <h1>Search our web site!</h1>
    <hr>
    <h2>Where do you want to search?</h2>
    <form action="url" method="get">
        <label><input type="radio" name="search_scope" value="whole_site"> Whole site</label><br>
        <label><input type="radio" name="search_scope" value="business_partners_sections"> Business Partners Section</label><br>
        <label><input type="radio" name="search_scope" value="Corporate_Communications_Sections"> Corporate Communications Section
        </label><br>
        <label><input type="radio" name="search_scope" value="lotus_education_sections"> Lotus Education Section</label>
        <br><br>
        <h3>Enter a word or two that we can search on</h3>
        <input type="text" name="search_string" size="100">
        <br><br>
        <input type="submit"  value="Submit">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
